<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistema</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    font-family: Arial;
}

.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    background: #020617;
    padding: 20px;
    border-right: 1px solid #1e293b;
}

.sidebar h4 {
    color: #22c55e;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: #94a3b8;
    margin: 12px 0;
    text-decoration: none;
}

.sidebar a:hover {
    color: white;
}

.content {
    margin-left: 240px;
    padding: 30px;
}

.card-dark {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h4>ONE Sistemas de Segurança</h4>

    <a href="/dashboard">📊 Dashboard</a>
    <a href="/clientes">👥 Clientes</a>
    <a href="/financeiro">💰 Caixa</a>
    <a href="/contas_pagar">💸 Contas a Pagar</a>
    <a href="/contas_receber">🧾 Contas a Receber</a>
    <a href="/agendamentos">📅 Agendamentos</a>
    <a href="/orcamentos">🧾 Orçamentos</a>

    <hr>
    <a href="/logout" class="btn btn-danger w-100">Sair</a>
</div>

<div class="content">

{% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const canvas = document.getElementById('grafico');

if (canvas) {
    const entradas = parseFloat(canvas.dataset.entradas || 0);
    const saidas = parseFloat(canvas.dataset.saidas || 0);
    const saldo = parseFloat(canvas.dataset.saldo || 0);

    new Chart(canvas, {
        type: 'line',
        data: {
            labels: ['Entradas', 'Saídas', 'Saldo'],
            datasets: [{
                label: 'Financeiro',
                data: [entradas, saidas, saldo],
                borderWidth: 2,
                tension: 0.4
            }]
        }
    });
}
</script>

</body>
</html>
